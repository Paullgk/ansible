# This inventory describes a SEAPATH cluster. It contains all required variables for a default deployment
# Replace all the TODOs to fit your physical machines.
# More informations on SEAPATH Wiki: https://lf-energy.atlassian.net/wiki/x/BIDtGQ

# Note : This inventory uses a three hypervisors setup.
# If you want to switch to a two hypervisor + one observer setup, you must :
# - choose which machine will be the observer (ex: observer)
# - remove the machine from the hypervisors group
# - add the machine to the observers group
# - remove the machine from the osds group
# - optionally, remove the ptp_interface variable of the machine

---
all:
  hosts:
    hypervisor1:
      ansible_host: 10.201.64.125 # Administration IP. TODO
      network_interface: eno1 # Administration interface. TODO
      # ptp_interface: "eno12419" # PTP interface. TODO

    hypervisor2:
      ansible_host: 10.201.64.126 # Administration IP. TODO
      network_interface: eno1 # Administration interface. TODO
      # ptp_interface: "eno12419" # PTP interface. TODO

    observer:
      ansible_host: 10.201.64.127 # Administration IP. TODO
      network_interface: enx782d7e14367c # Administration interface. TODO
      # ptp_interface: "eno12419" # PTP interface. TODO

  vars:
    # Debian specific, remove if you use Yocto. TODO
    admin_user: admin

    # Main network configuration
    gateway_addr: "10.201.0.1" # Administration Gateway. TODO
    dns_servers: "10.201.0.1" # DNS servers. Remove if not used. TODO
    subnet: 16 # Subnet mask in CIDR notation. TODO
    ntp_servers: # NTP servers IP. TODO
      - "10.201.0.1"
    ptp_domain_number: 0 # PTP domain number (0 to 255)
    timemaster_ptp_domain_number: "{{ ptp_domain_number }}"
    ptp_status_vsock_domain_number: "{{ ptp_domain_number }}"

    # SEAPATH ansible variables
    ansible_connection: ssh
    ansible_python_interpreter: /usr/bin/python3
    ansible_remote_tmp: /tmp/.ansible/tmp
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/sfl-seapath
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ip_addr: "{{ ansible_host }}"
    hostname: "{{ inventory_hostname }}"
    apply_network_config: true
    force_cephadm: true
    cephadm_pullimages: true
    cephadm_network: "{{ public_network }}"
    cephadm_hostname: "{{ inventory_hostname }}"
    cephadm_ip_addr: "{{ cluster_ip_addr }}"

# Three hypervisors setup. All machines are part of the hypervisor group.
hypervisors:
  hosts:
    hypervisor1:
    hypervisor2:

  vars:
    isolcpus: "4-N" # The list of CPUs to isolate. TODO
    livemigration_user: libvirtadmin

# Three hypervisors setup. The observer group is empty.
observers:
  hosts:
    observer:

# Cluster part. More information on the wiki: https://lf-energy.atlassian.net/wiki/x/SgB9GQ
cluster_machines:
  hosts:
    hypervisor1:
      team0_0: "eno2" # Cluster interface connected to hypervisor2. TODO
      team0_1: "eno3" # Cluster interface connected to observer. TODO
      cluster_ip_addr: "192.168.55.1" # IP address of this node on the cluster. TODO
      cluster_next_ip_addr : "192.168.55.2" # IP address of hypervisor2 on the cluster. TODO
      cluster_previous_ip_addr : "192.168.55.3" # IP address of observer on the cluster. TODO

    hypervisor2:
      team0_0: "eno2" # Cluster interface connected to observer. TODO
      team0_1: "eno3" # Cluster interface connected to hypervisor1. TODO
      cluster_ip_addr: "192.168.55.2" # IP address of this node on the cluster. TODO
      cluster_next_ip_addr : "192.168.55.3" # IP address of observer on the cluster. TODO
      cluster_previous_ip_addr :  "192.168.55.1" # IP address of hypervisor1 on the cluster. TODO

    observer:
      team0_0: "enp2s0" # Cluster interface connected to hypervisor1. TODO
      team0_1: "enp3s0" # Cluster interface connected to hypervisor2. TODO
      cluster_ip_addr: "192.168.55.3" # IP address of this node on the cluster. TODO
      cluster_next_ip_addr : "192.168.55.1" # IP address of hypervisor1 on the cluster. TODO
      cluster_previous_ip_addr :  "192.168.55.2" # IP address of hypervisor2 on the cluster. TODO
      br_rstp_priority: 12288 # Do not modify, used by RSTP

# Ceph monitor. All machines in the cluster must be part of mons groups
# Note : By default SEAPATH uses ceph-ansible to configure Ceph.
# You can also switch to cephadm deployment by setting force_cephadm to true (Only available on Debian for now)
mons:
  hosts:
    hypervisor1:
    hypervisor2:
    observer:
  vars:
    ceph_origin: distro
    cluster_network: "192.168.55.0/24" # IP range of your cluster. TODO
    public_network: "{{ cluster_network }}"
    monitor_address: "{{ cluster_ip_addr }}"
    # container_registry_url: "10.201.64.127:443"
    # podman_registry_mirror_url: "{{ container_registry_url }}"
    configure_firewall: false
    ntp_service_enabled: false
    dashboard_enabled: false
    ceph_conf_overrides:
      global:
        osd_pool_default_size: "{{ groups['hypervisors'] | length }}"
        osd_pool_default_min_size: 1
        osd_crush_chooseleaf_type: 1
        mon_osd_min_down_reporters: 1
      mon:
        auth_allow_insecure_global_id_reclaim: false
      osd:
        osd memory target: 8076326604

# Ceph OSD. Machines that will be used as OSDs (which will store data)
osds:
  hosts:
    hypervisor1:
    hypervisor2:
  vars:
    # Set this to the path of the disk that will contains ceph data.
    # The path can be found in "/dev/disk/by-path/"
    ceph_osd_disk: "/dev/disk/by-path/pci-0000:03:00.0-scsi-0:2:1:0" # TODO
    devices:
      - "{{ ceph_osd_disk }}"
    lvm_volumes:
      - data: lv_ceph
        data_vg: vg_ceph
        data_size: 6968
        device: "{{ ceph_osd_disk }}"
        device_number: 1
        device_size: 6978


# Ceph clients. All machines in the cluster must be part of clients groups
clients:
  hosts:
    hypervisor1:
    hypervisor2:
    observer:
  vars:
    user_config: true
    rbd:
      name: "rbd"
      application: "rbd"
      pg_autoscale_mode: "on"
      target_size_ratio: 1
      pg_num: 128
      pgp_num: 128
    pools:
      - "{{ rbd }}"
    keys:
      - name: client.libvirt
        caps:
          mon: 'profile rbd, allow command "osd blacklist"'
          osd: "allow class-read object_prefix rbd_children, profile rbd pool=rbd"
        mode: "{{ ceph_keyring_permissions }}"

# Empty groups to prevent warnings, mostly ceph-ansible
grafana-server:
iscsigws:
iscsi-gws:
mdss:
mgrs:
nfss:
rbdmirrors:
rgwloadbalancers:
rgws:
standalone_machine:
